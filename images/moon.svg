<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFFDF6" stop-opacity="1"/>
      <stop offset="30%" stop-color="#FFF5D1" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#E2C974" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E2C974" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background Glow -->
  <circle cx="50%" cy="50%" r="45" fill="url(#moonGlow)"/>
  <!-- Moon Body -->
  <circle cx="50%" cy="50%" r="28" fill="#FFFBEA" filter="url(#glow)"/>
  <!-- Moon Details/Craters -->
  <circle cx="42" cy="40" r="3" fill="#EADCA6" opacity="0.6"/>
  <circle cx="38" cy="52" r="5" fill="#EADCA6" opacity="0.5"/>
  <circle cx="58" cy="38" r="4" fill="#EADCA6" opacity="0.5"/>
  <circle cx="48" cy="62" r="2.5" fill="#EADCA6" opacity="0.6"/>
  <circle cx="62" cy="55" r="3.5" fill="#EADCA6" opacity="0.5"/>
</svg>
